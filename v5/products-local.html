let activeId=products[0]?.sku||'';
const catLabel={all:'全部产品','interior-accessories':'车内内饰配件','exterior-accessories':'车身外观外饰件','car-care':'汽车清洁养护',electronics:'车载电子数码',performance:'性能改装件','suv-rv':'皮卡 / SUV / 房车专用','motorcycle-accessories':'摩托车配件','safety-emergency':'安全应急用品','repair-tools':'维修工具耗材','travel-gifts':'车载出行礼品小件'};
function initCat(){const raw=new URLSearchParams(location.search).get('cat')||'all';category.value=catLabel[raw]?raw:'all';document.querySelectorAll('.system-tab').forEach(b=>b.classList.toggle('active',b.dataset.cat===category.value));}
function list(){const q=search.value.trim().toLowerCase();const cat=category.value;return products.filter(p=>(cat==='all'||p.cat===cat)&&(!q||p.name.toLowerCase().includes(q)||p.sku.includes(q)||p.sub.toLowerCase().includes(q)))}
function render(){const data=list();resultCount.textContent=`${data.length} / ${products.length} products · 当前分类：${catLabel[category.value]}`;rows.innerHTML=data.map(p=>`<div class="product-row ${p.sku===activeId?'active':''}" onclick="selectProduct('${p.sku}')"><img class="thumb" src="${p.img||''}" alt="${p.name}"><div class="pname">${p.name}</div><div class="sub">${p.sub}</div><div class="price">${p.price}</div><div class="moq">${p.moq}</div><div class="sku">${p.sku}</div></div>`).join('')||'<div style="padding:28px;color:#777">当前分类暂无产品</div>';if(!data.some(p=>p.sku===activeId)&&data[0])activeId=data[0].sku;renderDetail();}

function renderAttributes(p){const attrs=p.attributes||{};const keys=Object.keys(attrs);if(!keys.length)return '<div class="local-note">Detailed attributes are not available yet for this item.</div>';return `<div class="local-note"><b>Key attributes</b><div>${keys.map(k=>`<p><strong>${k}:</strong> ${attrs[k]}</p>`).join('')}</div></div>`}
function renderPackaging(p){const pkg=p.packaging||{};const keys=Object.keys(pkg);if(!keys.length)return '';return `<div class="local-note"><b>Packaging & delivery</b><div>${keys.map(k=>`<p><strong>${k}:</strong> ${pkg[k]}</p>`).join('')}</div></div>`}
function renderCustomization(p){const list=p.customization||[];if(!list.length)return '';return `<div class="local-note"><b>Customization options</b><ul>${list.map(x=>`<li>${x}</li>`).join('')}</ul></div>`}

function renderDetail(){const p=products.find(x=>x.sku===activeId)||list()[0]||products[0];if(!p) return;detail.innerHTML=`<img src="${p.img||''}" alt="${p.name}"><div class="detail-content"><small>LOCAL PRODUCT PROFILE</small><h2>${p.name}</h2><div class="specs"><div class="spec"><b>SKU</b>${p.sku}</div><div class="spec"><b>Category</b>${catLabel[p.cat]}</div><div class="spec"><b>Subcategory</b>${p.sub}</div><div class="spec"><b>Price</b>${p.price}</div><div class="spec"><b>MOQ</b>${p.moq}</div><div class="spec"><b>Source</b>Store product list</div></div>${renderAttributes(p)}${renderPackaging(p)}${renderCustomization(p)}<p class="local-note">This is a local product profile. It does not redirect to Alibaba or any external marketplace product detail page.</p></div>`}
function selectProduct(sku){activeId=sku;render()}
document.querySelectorAll('.system-tab').forEach(btn=>btn.onclick=()=>{document.querySelectorAll('.system-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');category.value=btn.dataset.cat;render()});search.oninput=render;category.onchange=render;initCat();render();
