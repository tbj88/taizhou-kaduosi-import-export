fr);gap:22px}.product-card{border:1px solid var(--line);background:#fff;display:flex;flex-direction:column;cursor:pointer}.product-card:hover,.product-card.active{border-color:var(--red);box-shadow:0 6px 22px rgba(0,0,0,.06)}.product-card img{width:100%;height:190px;object-fit:cover;background:#eee}.product-body{padding:20px;display:flex;flex-direction:column;flex:1}.product-body h3{font-size:18px;line-height:1.35;margin:0 0 12px}.product-meta{display:flex;justify-content:space-between;color:var(--red);font-weight:800;font-size:14px;margin:4px 0 14px}.tags span{display:inline-block;border:1px solid var(--line);padding:4px 8px;margin:3px;color:#555;font-size:12px}.detail-panel{margin-top:34px;border:1px solid var(--line);background:#fff;display:grid;grid-template-columns:360px 1fr;gap:0}.detail-panel img{width:100%;height:100%;min-height:320px;object-fit:cover;background:#eee}.detail-content{padding:30px}.detail-content small{color:var(--red);font-weight:700;letter-spacing:.08em}.detail-content h2{font-size:30px;line-height:1.22;margin:10px 0 20px}.specs{display:grid;grid-template-columns:repeat(2,1fr);gap:0;border-top:1px solid var(--line);border-left:1px solid var(--line)}.spec{padding:14px;border-right:1px solid var(--line);border-bottom:1px solid var(--line)}.spec b{display:block;color:var(--muted);font-size:13px;margin-bottom:4px}.local-note{margin-top:18px;background:var(--soft);padding:14px;color:#555}.footer{background:#f3f3f3;padding:36px 7vw;color:#555;margin-top:40px}@media(max-width:1080px){.product-grid{grid-template-columns:repeat(2,1fr)}.detail-panel{grid-template-columns:1fr}.system-tabs{grid-template-columns:1fr}.catalog-toolbar{grid-template-columns:1fr}.navlinks,.tools{display:none}}@media(max-width:620px){.product-grid{grid-template-columns:1fr}.hero,.section,.nav,.topbar,.breadcrumb{padding-left:24px;padding-right:24px}.hero h1{font-size:36px}.detail-content{padding:22px}.specs{grid-template-columns:1fr}}

<div class="catalog-toolbar"><input id="search" class="catalog-search" placeholder="Search by name or SKU..."><select id="category" class="category-filter"><option value="all">All Categories</option><option value="custom">车型定制</option><option value="universal">通用套装</option><option value="accessories">防护加购</option></select><select id="sort" class="sort-select"><option>Featured</option><option>Price</option><option>MOQ</option></select></div><p id="categoryNote" style="color:#666;margin:0 0 8px;font-size:14px"></p>

<script>
const products=[

{id:'p02',name:'Luxury Custom-made Genuine Leather Car Seat Covers Suitable for Tesla Model 3/Model Y/Model X/Model S Waterproof Seat Protectors',sku:'1601632927032',price:'$110-150',moq:'1 set',category:'custom',img:'https://s.alicdn.com/@sc04/kf/Hb02cad7cb54a4076b8a2ba3552af4cb8G/Luxury-Custom-made-Genuine-Leather-Car_1601632927032.jpg?hasNWGrade=1',tags:['Tesla fit','Waterproof','Genuine leather'],best:'Premium vehicle upgrades, private-label model programs'},
{id:'p03',name:'High-quality Universal Luxury Leather Car Seat Covers Perforated and Breathable 10-Piece Full Car Set for All Seasons',sku:'1601626162678',price:'$27-35',moq:'100 sets',category:'universal',img:'https://s.alicdn.com/@sc04/kf/H23361edc971c4fcb9cc17d5d3c4c0f08B/High-quality-Universal-Luxury-Leather-Car-Seat.jpg_480x480.jpg?hasNWGrade=1',tags:['10-piece set','Breathable','All season'],best:'Wholesale distribution and fast-moving retail ranges'},
{id:'p04',name:'Leather Full Set Car Seat Covers Universal Fit for Most Vehicles Protective All-Season Waterproof Durable Auto Interior',sku:'1601640969940',price:'$26-31',moq:'50 sets',category:'universal',img:'https://s.alicdn.com/@sc04/kf/Hfb13d0b422e24f55a0b050b209e6d524P/Leather-Full-Set-Car-Seat-Covers-Universal.jpg?hasNWGrade=1',tags:['Universal fit','Waterproof','Durable'],best:'Wholesale distribution and fast-moving retail ranges'},
{id:'p05',name:'High-quality Leather Car Seat Covers Full Set Anti-slip Waterproof with Lumbar Support Cushions Suitable for All Seasons',sku:'1601661839955',price:'$40-43',moq:'50 sets',category:'universal',img:'https://s.alicdn.com/@sc04/kf/H360b654e660b4939885468b9409f69abL/High-quality-Leather-Car-Seat-Covers-Full.jpg?hasNWGrade=1',tags:['Lumbar support','Anti-slip','Waterproof'],best:'Wholesale distribution and fast-moving retail ranges'},
{id:'p06',name:'High-quality Leather Single Seat Water Proof Car Seat Cover Protect Seat Pet Mat Baby Seat Protector and Driver\'s Seat Cushion',sku:'1601647290088',price:'$2.70-3.06',moq:'100 pieces',category:'accessories',img:'https://s.alicdn.com/@sc04/kf/H73359a3fe0c7463a87d152fc7b55e59ds/High-quality-Leather-Single-Seat-Water-Proof.jpg_480x480.jpg?hasNWGrade=1',tags:['Single seat','Pet mat','Baby seat protector'],best:'Accessory bundles, pet/family protection and add-on sales'},
{id:'p07',name:'High-end Custom Leather 2025 Yuan PLUS Intelligent Driving Version Car Seat Covers Five-seat Full Coverage Car Seat protection',sku:'1601636349641',price:'$45-60',moq:'1 piece',category:'custom',img:'https://s.alicdn.com/@sc04/kf/A57045111ba264e21b14f448aadd755a9H/High-end-Custom-Leather-2025-Yuan-PLUS.jpg?hasNWGrade=1',tags:['BYD Yuan PLUS','Full coverage','2025 model'],best:'Premium vehicle upgrades, private-label model programs'},
{id:'p08',name:'Perforated and Breathable Leather Car Seat Covers for 2025 BYD Song PLUS DM-i Models Fully Covering Five Seats',sku:'1601623209750',price:'$50-65',moq:'1 set',category:'custom',img:'https://s.alicdn.com/@sc04/kf/A3c5a4eee30e44a35911fd3961b21d822E/Perforated-and-Breathable-Leather-Car-Seat-Covers.jpg?hasNWGrade=1',tags:['BYD Song PLUS','Perforated','Five seats'],best:'Premium vehicle upgrades, private-label model programs'}
];
let activeId='p01';
const catMap={all:'all','seat-covers':'custom','steering-wheel-covers':'all','lumbar-support':'accessories','sunshades':'all','snow-shields':'all','car-covers':'all','floor-mats':'all','trunk-storage':'all','exterior-accessories':'all'};
const catLabel={all:'全部产品','seat-covers':'汽车座套','steering-wheel-covers':'方向盘套','lumbar-support':'腰靠','sunshades':'遮阳挡','snow-shields':'雪挡','car-covers':'汽车罩','floor-mats':'脚垫','trunk-storage':'后备箱储物','exterior-accessories':'外观改装件'};
function typeName(cat){return cat==='custom'?'车型定制 / Custom fit':cat==='universal'?'通用套装 / Universal set':'防护加购 / Protection add-on'}
function currentList(){const q=search.value.trim().toLowerCase();const cat=category.value;return products.filter(p=>(cat==='all'||p.category===cat)&&(!q||p.name.toLowerCase().includes(q)||p.sku.includes(q)||p.tags.join(' ').toLowerCase().includes(q)))}
function render(){const list=currentList();grid.innerHTML=list.map(p=>`<article class="product-card ${p.id===activeId?'active':''}" onclick="selectProduct('${p.id}')"><img src="${p.img}" alt="${p.name}"><div class="product-body"><h3>${p.name}</h3><p class="product-meta"><span>${p.price}</span><span>MOQ ${p.moq}</span></p><p class="tags">${p.tags.map(t=>`<span>${t}</span>`).join('')}</p></div></article>`).join('');if(!list.some(p=>p.id===activeId)&&list[0])activeId=list[0].id;renderDetail();}
function renderDetail(){const p=products.find(x=>x.id===activeId)||products[0];detail.innerHTML=`<img src="${p.img}" alt="${p.name}"><div class="detail-content"><small>LOCAL PRODUCT PROFILE</small><h2>${p.name}</h2><div class="specs"><div class="spec"><b>SKU</b>${p.sku}</div><div class="spec"><b>Price</b>${p.price}</div><div class="spec"><b>MOQ</b>${p.moq}</div><div class="spec"><b>Type</b>${typeName(p.category)}</div><div class="spec"><b>Best for</b>${p.best}</div><div class="spec"><b>Tags</b>${p.tags.join(' · ')}</div></div><p class="local-note">This is a local product profile. It does not redirect to Alibaba or any external marketplace product detail page.</p></div>`}
function selectProduct(id){activeId=id;render()}
function initFromUrl(){const raw=new URLSearchParams(location.search).get('cat')||'all';const mapped=catMap[raw]||'all';category.value=mapped;categoryNote.textContent=raw==='all'?'当前分类：全部产品':`当前分类：${catLabel[raw]||raw}（${mapped==='all'?'暂无独立产品，先显示全部本地产品':'已匹配到对应产品系统'}）`;document.querySelectorAll('.system-tab').forEach(b=>b.classList.toggle('active',b.dataset.cat===mapped));}
document.querySelectorAll('.system-tab').forEach(btn=>btn.onclick=()=>{document.querySelectorAll('.system-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');category.value=btn.dataset.cat;categoryNote.textContent='当前分类：'+btn.querySelector('h3').textContent;render()});search.oninput=render;category.onchange=()=>{categoryNote.textContent='当前分类：'+category.options[category.selectedIndex].text;render()};initFromUrl();render();
</script>
