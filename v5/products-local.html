const catLabel={all:'全部分类','interior-accessories':'车内内饰配件','exterior-accessories':'车身外观外饰件','car-care':'汽车清洁养护',electronics:'车载电子数码',performance:'性能改装件','suv-rv':'皮卡 / SUV / 房车专用','motorcycle-accessories':'摩托车配件','safety-emergency':'安全应急用品','repair-tools':'维修工具耗材','travel-gifts':'车载出行礼品小件'};

const taxonomy={
  all:{label:'全部产品',children:{all:{label:'全部产品',children:{all:'全部产品'}}}},
  interior:{label:'车内内饰配件',children:{seat:{label:'座套/坐垫',children:{custom:'车型定制座套',universal:'通用座套',protector:'座椅保护垫'}},wheel:{label:'方向盘/腰靠',children:{steering:'方向盘套',lumbar:'腰靠'}},shade:{label:'遮阳/储物',children:{sunshade:'遮阳挡',storage:'后备箱储物'}}}},
  exterior:{label:'车身外观外饰件',children:{cover:{label:'车罩/雪挡',children:{carcover:'汽车罩',snow:'雪挡'}},trim:{label:'外观装饰',children:{exterior:'外观改装件'}}}},
  care:{label:'汽车清洁养护',children:{clean:{label:'清洁护理',children:{care:'清洁养护用品'}}}},
  electronic:{label:'车载电子数码',children:{digital:{label:'车载数码',children:{electronics:'车载电子配件'}}}},
  performance:{label:'性能改装件',children:{upgrade:{label:'性能升级',children:{performance:'性能改装件'}}}},
  suv:{label:'皮卡/SUV/房车专用',children:{outdoor:{label:'户外车型',children:{suv:'皮卡/SUV/房车用品'}}}},
  gift:{label:'车载出行礼品小件',children:{gift:{label:'出行小件',children:{travel:'车载礼品小件'}}}}
};
function fillSelect(sel, entries, placeholder){sel.innerHTML=`<option value="all">${placeholder}</option>`+Object.entries(entries).map(([k,v])=>`<option value="${k}">${typeof v==='string'?v:v.label}</option>`).join('')}
function setupLevels(){fillSelect(level1,taxonomy,'一级类目');fillSelect(level2,{},'二级类目');fillSelect(level3,{},'三级类目')}
function levelToCat(){const l1=level1.value,l2=level2.value,l3=level3.value;if(l1==='all')return 'all'; if(l1==='interior')return 'interior-accessories'; if(l1==='exterior')return 'exterior-accessories'; if(l1==='care')return 'car-care'; if(l1==='electronic')return 'electronics'; if(l1==='performance')return 'performance'; if(l1==='suv')return 'suv-rv'; if(l1==='gift')return 'travel-gifts'; return 'all'}

function syncCategoryLinks(){document.querySelectorAll('.category-link').forEach(b=>b.classList.toggle('active',b.dataset.cat===category.value))}
function initCat(){setupLevels();const raw=new URLSearchParams(location.search).get('cat')||'all';category.value=catLabel[raw]?raw:'all';syncCategoryLinks()}
function list(){const q=search.value.trim().toLowerCase();const cat=category.value;return products.filter(p=>(cat==='all'||p.cat===cat)&&(!q||p.name.toLowerCase().includes(q)||p.sku.includes(q)||String(p.sub||'').toLowerCase().includes(q)))}
function render(){const data=list();status.textContent=`共 ${data.length} / ${products.length} 个产品 · 当前分类：${catLabel[category.value]}`;grid.innerHTML=data.length?data.map(p=>`<a class="product-card" href="product-detail.html?sku=${p.sku}"><img class="product-image" src="${p.img||''}" alt="${p.name}"><div class="product-body"><div class="product-sku">${p.sku}</div><h3 class="product-title">${p.name}</h3><div class="product-info"><div class="info-block"><b>项目报价</b><span>${p.price||'-'}</span></div><div class="info-block"><b>MOQ</b><span>${p.moq||'-'}</span></div></div><p class="product-tags">${(p.tags||[]).slice(0,4).map(t=>`<span>${t}</span>`).join('')}</p></div></a>`).join(''):'<div class="empty">当前分类暂无产品</div>'}
document.querySelectorAll('.category-link').forEach(btn=>btn.onclick=()=>{category.value=btn.dataset.cat;syncCategoryLinks();render()});level1.onchange=()=>{const item=taxonomy[level1.value];fillSelect(level2,item&&item.children?item.children:{},'二级类目');fillSelect(level3,{},'三级类目');category.value=levelToCat();syncCategoryLinks();render()};level2.onchange=()=>{const item=taxonomy[level1.value]?.children?.[level2.value];fillSelect(level3,item&&item.children?item.children:{},'三级类目');category.value=levelToCat();syncCategoryLinks();render()};level3.onchange=()=>{category.value=levelToCat();syncCategoryLinks();render()};search.oninput=render;category.onchange=()=>{syncCategoryLinks();render()};initCat();render();
</script>
